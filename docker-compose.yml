services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - USE_REDIS=true
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on: [redis]
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app

  celery_worker:
    build: ./backend
    command: celery -A config worker -l info -Q analysis,default,exports --concurrency=4
    env_file: ./backend/.env
    environment:
      - USE_REDIS=true
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on: [redis, backend]
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]

  